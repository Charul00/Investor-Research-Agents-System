services:
  postgres:
    image: postgres:16-alpine
    container_name: klypup-research-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-klypup_research}
      POSTGRES_USER: ${POSTGRES_USER:-klypup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-klypup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klypup} -d ${POSTGRES_DB:-klypup_research}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
